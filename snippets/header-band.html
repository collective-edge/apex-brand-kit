<!-- Apex Paramedics header band — drop-in markup.
     Drop this into the top of any one-pager / report / letterhead.
     Edit the .h1 text. Logo loads from the CDN.
     Make sure brand-base.css (or equivalent @font-face) is loaded for Montserrat. -->
<header style="background:#0E3468; color:#FFFFFF; padding:0.32in 0.5in; display:flex; align-items:center; justify-content:space-between; font-family:'Montserrat',sans-serif; border-bottom:3px solid #FFC92B;">
  <div class="h1" style="font-weight:800; font-size:18pt; letter-spacing:1.5px; text-transform:uppercase; line-height:1.05;">
    YOUR TITLE HERE
  </div>
  <img
    src="https://cdn.jsdelivr.net/gh/collective-edge/apex-brand-kit@main/assets/logos/horizontal-white.svg"
    alt="Apex Paramedics"
    style="width:1.6in; height:auto; display:block;"
  />
</header>
